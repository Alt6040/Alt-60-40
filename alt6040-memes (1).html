<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ALT 60/40 — DESIGN SYSTEM
   ═══════════════════════════════════════ */
:root {
  --wine:    #640031;
  --magenta: #7A1843;
  --gold:    #F7CB15;
  --steel:   #7698B3;
  --white:   #FAFAFF;

  --wine-l:  #7d0040;
  --gold-d:  #e0b711;
  --ink:     #2a0e1c;
  --gray:    #8a7d85;
  --border:  #ecdfe4;
  --bg:      var(--white);
  --bg-soft: #f9f5f1;
  --card-bg: var(--white);
  --text:    var(--ink);
  --text-soft: #5d5159;

  --fD: 'Space Grotesk', sans-serif;
  --fB: 'Inter', sans-serif;
  --ease: cubic-bezier(.25,.46,.45,.94);

  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
}

/* ─── DARK MODE ─── */
html.dark {
  --bg:      #15090f;
  --bg-soft: #1c0e16;
  --card-bg: #20121a;
  --text:    #f5eef2;
  --text-soft: #c9b8c2;
  --border:  #3a2030;
  --gray:    #a594a0;
}

/* ─── HIGH CONTRAST MODE ─── */
html.contrast {
  --wine: #4a0024;
  --text: #000;
  --text-soft: #000;
  --border: #000;
}
html.contrast.dark {
  --text: #fff;
  --text-soft: #fff;
  --border: #fff;
  --bg: #000;
  --bg-soft: #000;
  --card-bg: #0a0a0a;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
html.no-scroll{ overflow:hidden; }
body{
  font-family:var(--fB);
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  transition: background .25s, color .25s;
}
::selection { background: var(--gold); color: var(--wine); }
a{ color:inherit; }
img{ max-width:100%; display:block; }
button{ font-family:inherit; }

/* font-size scaling for accessibility */
html.font-lg{ font-size:112.5%; }
html.font-xl{ font-size:125%; }

section[id], div[id]{ scroll-margin-top: 84px; }

/* ─── VISIBLE FOCUS ─── */
a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {
  outline: 2.5px solid var(--gold);
  outline-offset: 2px;
}

/* ─── REDUCED MOTION ─── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
}

/* ═══ NAV ═══ */
nav.site-nav{
  position:sticky; top:0; z-index:500;
  background:var(--wine);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 48px; height:64px;
  border-bottom: 3px solid var(--gold);
}
.logo{ font-family:var(--fD); font-size:20px; font-weight:800; color:var(--white); letter-spacing:-.5px; text-decoration:none; }
.logo b{ color:var(--gold); }
.navlinks{ display:flex; gap:4px; align-items:center; }
.navlinks a{
  font-family:var(--fD); font-size:13px; font-weight:600;
  color:rgba(250,250,255,.75); text-decoration:none;
  padding:8px 13px; border-radius:8px; transition:all .15s;
  white-space:nowrap;
}
.navlinks a:hover, .navlinks a.current{ color:var(--white); background:rgba(255,255,255,.08); }
.nav-cta{
  background:var(--gold); color:var(--wine) !important;
  font-weight:700 !important; padding:9px 18px !important; margin-left:6px;
}
.nav-cta:hover{ background:#fff !important; }

.nav-icon-btn{
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
  width:36px; height:36px; border-radius:9px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s; flex-shrink:0;
}
.nav-icon-btn:hover{ background:rgba(255,255,255,.18); }
.nav-icon-btn svg{ width:17px; height:17px; }

.nav-right{ display:flex; align-items:center; gap:8px; }

.nav-avatar-btn{
  width:36px; height:36px; border-radius:50%;
  background:var(--gold); color:var(--wine);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fD); font-weight:700; font-size:13px;
  cursor:pointer; border:none; flex-shrink:0;
}

/* hamburger (mobile only) */
.hamburger{
  display:none; flex-direction:column; gap:4px; cursor:pointer;
  background:none; border:none; padding:8px; width:36px; height:36px;
  align-items:center; justify-content:center;
}
.hamburger span{ width:20px; height:2px; background:var(--white); border-radius:2px; transition:all .2s; }
.hamburger.open span:nth-child(1){ transform:translateY(6px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform:translateY(-6px) rotate(-45deg); }

.mobile-drawer{
  display:none; position:fixed; top:64px; left:0; right:0; bottom:0; z-index:480;
  background:var(--wine); padding:24px; overflow-y:auto;
}
.mobile-drawer.open{ display:block; }
.mobile-drawer a{
  display:block; font-family:var(--fD); font-size:17px; font-weight:600;
  color:var(--white); text-decoration:none; padding:14px 4px;
  border-bottom:1px solid rgba(255,255,255,.1);
}

/* ═══ FOOTER ═══ */
footer.site-footer{ background:var(--wine); padding:60px 48px 0; }
.footer-grid{
  max-width:1240px; margin:0 auto;
  display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr; gap:40px;
  padding-bottom:40px; border-bottom:1px solid rgba(255,255,255,.1);
}
.f-logo{ font-family:var(--fD); font-size:20px; font-weight:800; color:var(--white); margin-bottom:14px; }
.f-logo b{ color:var(--gold); }
.f-desc{ font-size:13px; color:rgba(250,250,255,.55); line-height:1.7; max-width:260px; margin-bottom:18px; }
.f-social{ display:flex; gap:10px; }
.f-social a{
  width:34px; height:34px; border-radius:9px; background:rgba(255,255,255,.08);
  display:flex; align-items:center; justify-content:center; transition:background .15s;
}
.f-social a:hover{ background:var(--gold); }
.f-social svg{ width:16px; height:16px; fill:var(--white); }
.f-social a:hover svg{ fill:var(--wine); }
.f-col-title{ font-family:var(--fD); font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }
.f-links{ list-style:none; display:flex; flex-direction:column; gap:10px; }
.f-links a{ font-size:13px; color:rgba(250,250,255,.6); text-decoration:none; transition:color .2s; }
.f-links a:hover{ color:var(--gold); }
.footer-bottom{
  max-width:1240px; margin:0 auto; padding:22px 0;
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
}
.footer-bottom p{ font-size:12.5px; color:rgba(250,250,255,.45); }
.footer-bottom-links{ display:flex; gap:18px; flex-wrap:wrap; }
.footer-bottom-links a{ font-size:12.5px; color:rgba(250,250,255,.45); text-decoration:none; }
.footer-bottom-links a:hover{ color:var(--gold); }

/* ═══ SHARED BUTTONS ═══ */
.btn-gold{
  background:var(--gold); color:var(--wine);
  font-family:var(--fD); font-weight:700; font-size:15px;
  padding:14px 32px; border-radius:10px; border:none; cursor:pointer;
  text-decoration:none; display:inline-block; transition:all .2s;
  box-shadow:0 8px 28px rgba(247,203,21,.3);
}
.btn-gold:hover{ background:#fff; transform:translateY(-2px); box-shadow:0 12px 36px rgba(247,203,21,.4); }
.btn-outline{
  background:transparent; color:var(--white);
  font-family:var(--fD); font-weight:700; font-size:15px;
  padding:14px 32px; border-radius:10px; border:1.5px solid rgba(255,255,255,.3); cursor:pointer;
  text-decoration:none; display:inline-block; transition:all .2s;
}
.btn-outline:hover{ border-color:var(--white); background:rgba(255,255,255,.08); transform:translateY(-2px); }
.btn-wine{
  background:var(--wine); color:#fff;
  font-family:var(--fD); font-weight:700; font-size:14px;
  padding:12px 26px; border-radius:9px; border:none; cursor:pointer;
  text-decoration:none; display:inline-block; transition:all .2s;
}
.btn-wine:hover{ background:var(--magenta); transform:translateY(-2px); }
.btn-ghost-wine{
  background:transparent; color:var(--wine); border:1.5px solid var(--border);
  font-family:var(--fD); font-weight:700; font-size:13px;
  padding:10px 22px; border-radius:9px; cursor:pointer; transition:all .15s;
  text-decoration:none; display:inline-block;
}
.btn-ghost-wine:hover{ border-color:var(--wine); background:#f5eef1; }

/* ═══ SECTION BASE ═══ */
.section{ max-width:1240px; margin:0 auto; padding:80px 48px; }
.eyebrow{
  font-family:var(--fD); font-size:11px; font-weight:700;
  letter-spacing:3px; text-transform:uppercase; color:var(--magenta);
  margin-bottom:16px;
}
.eyebrow.on-dark{ color:var(--gold); }
.sec-title{
  font-family:var(--fD); font-size:clamp(28px,4vw,46px); font-weight:800;
  letter-spacing:-1px; line-height:1.1; color:var(--wine); margin-bottom:18px;
}
html.dark .sec-title{ color:var(--gold); }
.sec-title.on-dark{ color:var(--white); }
.sec-body{ font-size:16px; line-height:1.75; color:var(--text-soft); max-width:640px; }

/* ═══ PAGE HERO (subpages) ═══ */
.page-hero{
  background: var(--wine);
  background-image:
    radial-gradient(ellipse 70% 60% at 15% 20%, rgba(122,24,67,.7) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 80%, rgba(247,203,21,.12) 0%, transparent 60%);
  padding:64px 48px; text-align:center;
}
.page-hero-eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(247,203,21,.15); border:1px solid rgba(247,203,21,.35);
  color:var(--gold); font-family:var(--fD); font-size:12px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  padding:7px 16px; border-radius:100px; margin-bottom:20px;
}
.page-hero-title{
  font-family:var(--fD); font-weight:800;
  font-size:clamp(30px,5vw,52px); color:var(--white);
  line-height:1.08; letter-spacing:-1.5px;
}
.page-hero-sub{
  font-size:16px; color:rgba(250,250,255,.78);
  max-width:560px; margin:18px auto 0; line-height:1.7; font-weight:300;
}

/* ═══ REVEAL ═══ */
.reveal{ opacity:0; transform:translateY(28px); transition:opacity .65s var(--ease), transform .65s var(--ease); }
.reveal.visible{ opacity:1; transform:none; }

/* ═══ TOAST ═══ */
#toast-host{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast{
  background:var(--wine); color:#fff; font-family:var(--fB); font-size:13.5px; font-weight:500;
  padding:12px 22px; border-radius:100px; box-shadow:0 10px 30px rgba(0,0,0,.25);
  display:flex; align-items:center; gap:8px;
  animation: toastIn .25s var(--ease);
}
@keyframes toastIn{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:none;} }

/* ═══ MODAL BASE ═══ */
.modal-overlay{
  display:none; position:fixed; inset:0; background:rgba(20,5,12,.6);
  z-index:2000; align-items:center; justify-content:center; padding:20px;
  backdrop-filter: blur(3px);
}
.modal-overlay.open{ display:flex; }
.modal-box{
  background:var(--card-bg); border-radius:var(--radius-lg);
  width:min(420px,100%); padding:36px; position:relative;
  max-height:90vh; overflow-y:auto;
  animation: modalIn .25s var(--ease);
}
@keyframes modalIn{ from{opacity:0;transform:scale(.96) translateY(8px);} to{opacity:1;transform:none;} }
.modal-close{
  position:absolute; top:18px; right:18px; background:none; border:none;
  font-size:22px; color:var(--gray); cursor:pointer; line-height:1; padding:4px;
}
.modal-close:hover{ color:var(--wine); }

/* ═══ A11Y WIDGET ═══ */
#a11y-toggle{
  position:fixed; bottom:24px; right:24px; z-index:1000;
  width:50px; height:50px; border-radius:50%;
  background:var(--wine); border:2px solid var(--gold); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,.25); transition:transform .2s;
}
#a11y-toggle:hover{ transform:scale(1.08); }
#a11y-toggle svg{ width:22px; height:22px; fill:var(--gold); }

#a11y-panel{
  display:none; position:fixed; bottom:84px; right:24px; z-index:1000;
  background:var(--card-bg); border:1.5px solid var(--border); border-radius:16px;
  padding:20px; width:240px; box-shadow:0 16px 48px rgba(0,0,0,.2);
}
#a11y-panel.open{ display:block; }
.a11y-row{ display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
.a11y-row:last-child{ border-bottom:none; }
.a11y-label{ font-size:13px; font-weight:600; color:var(--text); }
.a11y-btns{ display:flex; gap:4px; }
.a11y-mini-btn{
  width:28px; height:28px; border-radius:6px; border:1.5px solid var(--border);
  background:var(--bg); color:var(--text); cursor:pointer; font-size:12px; font-weight:700;
}
.a11y-mini-btn.active{ background:var(--wine); color:#fff; border-color:var(--wine); }
.a11y-toggle-switch{
  width:38px; height:22px; border-radius:100px; background:var(--border); position:relative; cursor:pointer; border:none;
}
.a11y-toggle-switch::after{
  content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
  background:#fff; transition:transform .2s;
}
.a11y-toggle-switch.on{ background:var(--wine); }
.a11y-toggle-switch.on::after{ transform:translateX(16px); }

/* ═══ RESPONSIVE ═══ */
@media(max-width:1000px){
  nav.site-nav{ padding:0 20px; }
  .navlinks{ display:none; }
  .hamburger{ display:flex; }
  .section{ padding:56px 20px; }
  .page-hero{ padding:48px 20px; }
  .footer-grid{ grid-template-columns:1fr 1fr; padding:0 20px 32px; }
  footer.site-footer{ padding:40px 0 0; }
  .footer-bottom{ padding:20px; flex-direction:column; text-align:center; }
}

</style>
<style>

.mfil{font-family:var(--fD);font-size:13px;font-weight:700;background:var(--card-bg);border:1.5px solid var(--border);color:var(--wine);padding:8px 16px;border-radius:100px;cursor:pointer;transition:all .15s;}

<body>
<div id="site-nav-placeholder"></div>
<div class="page-hero">
  <div class="page-hero-eyebrow">😂 Biblioteca de Memes — Julio 2026</div>
  <h1 class="page-hero-title">Memes de todas las generaciones</h1>
  <p class="page-hero-sub">Los más virales de 2026 y los clásicos que toda generación debería conocer. Con origen, historia, contexto y vigencia.</p>
</div>

<div class="meme-filter-row" id="memeFilters"></div>
<div class="meme-grid" id="memeGrid"></div>

<div id="site-footer-placeholder"></div>
<script>
/* ═══════════════════════════════════════
   ALT 60/40 — APP CORE (shared state & utils)
   Persisted via localStorage. No real backend —
   this simulates auth/progress for the prototype.
   ═══════════════════════════════════════ */

const ALT = {
  STORE_KEY: 'alt6040_state',

  defaultState() {
    return {
      user: null, // { name, email, initials }
      favorites: [],        // array of term ids
      history: [],          // array of {term, ts}
      learned: [],          // array of term ids marked "aprendida"
      courseProgress: {},   // { courseId: percent }
      achievements: [],     // array of achievement ids unlocked
      darkMode: false,
      fontSize: 'base',     // base | lg | xl
      highContrast: false,
    };
  },

  state: null,

  load() {
    try {
      const raw = localStorage.getItem(this.STORE_KEY);
      this.state = raw ? Object.assign(this.defaultState(), JSON.parse(raw)) : this.defaultState();
    } catch(e) {
      this.state = this.defaultState();
    }
    return this.state;
  },

  save() {
    localStorage.setItem(this.STORE_KEY, JSON.stringify(this.state));
  },

  /* ── AUTH (simulated) ── */
  login(name, email) {
    const initials = name.trim().split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase();
    this.state.user = { name: name.trim(), email: email.trim(), initials: initials || 'U' };
    this.save();
  },
  loginWithGoogle() {
    this.login('Usuario Google', 'usuario@gmail.com');
  },
  logout() {
    this.state.user = null;
    this.save();
  },
  isLoggedIn() { return !!this.state.user; },

  /* ── FAVORITES ── */
  toggleFavorite(termId) {
    const i = this.state.favorites.indexOf(termId);
    if (i >= 0) { this.state.favorites.splice(i,1); } else { this.state.favorites.push(termId); }
    this.save();
    return this.state.favorites.includes(termId);
  },
  isFavorite(termId) { return this.state.favorites.includes(termId); },

  /* ── HISTORY ── */
  addHistory(termLabel) {
    this.state.history = this.state.history.filter(h => h.term !== termLabel);
    this.state.history.unshift({ term: termLabel, ts: Date.now() });
    this.state.history = this.state.history.slice(0, 20);
    this.save();
  },

  /* ── LEARNED WORDS ── */
  markLearned(termId) {
    if (!this.state.learned.includes(termId)) {
      this.state.learned.push(termId);
      this.save();
      this.checkAchievements();
    }
  },

  /* ── COURSE PROGRESS ── */
  setCourseProgress(courseId, percent) {
    this.state.courseProgress[courseId] = percent;
    this.save();
    this.checkAchievements();
  },
  getCourseProgress(courseId) { return this.state.courseProgress[courseId] || 0; },

  /* ── ACHIEVEMENTS ── */
  ACHIEVEMENT_DEFS: [
    { id: 'first_word',  name: 'Primer meme aprendido', desc: 'Aprendiste tu primera palabra', icon: '🎉', check: s => s.learned.length >= 1 },
    { id: 'hundred',     name: '100 términos descubiertos', desc: 'Marcaste 100 palabras como aprendidas', icon: '💯', check: s => s.learned.length >= 100 },

    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
    this.toast('🔊 Leyendo página en voz alta...');
  },
  stopReading() {
    speechSynthesis.cancel();
  },

  /* ── TOAST ── */

    if (!host) {
      host = document.createElement('div');
      host.id = 'toast-host';
      document.body.appendChild(host);
    }
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    host.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(), 300); }, ms);
  },

  /* ── COPY TO CLIPBOARD ── */
  copyText(text, successMsg='Copiado al portapapeles') {

  init() {

      if (avatarBtn) avatarBtn.style.display = 'none';
    }
  }
};

ALT.load();
ALT.applyDarkMode();
ALT.applyA11y();

document.addEventListener('DOMContentLoaded', () => {
  ALT.init();

  /* ── mobile hamburger ── */
  const hamburger = document.getElementById('hamburgerBtn');
  const drawer = document.getElementById('mobileDrawer');
  if (hamburger && drawer) {
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      drawer.classList.toggle('open');
      document.documentElement.classList.toggle('no-scroll', drawer.classList.contains('open'));
    });
    drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      hamburger.classList.remove('open');
      drawer.classList.remove('open');
      document.documentElement.classList.remove('no-scroll');
    }));
  }

  /* ── dark mode toggle button ── */
  document.querySelectorAll('[data-dark-toggle]').forEach(btn => {
    btn.addEventListener('click', () => ALT.toggleDarkMode());
  });

  /* ── a11y panel ── */
  const a11yToggle = document.getElementById('a11y-toggle');
  const a11yPanel = document.getElementById('a11y-panel');
  if (a11yToggle && a11yPanel) {
    a11yToggle.addEventListener('click', () => a11yPanel.classList.toggle('open'));
    document.addEventListener('click', (e) => {
      if (!a11yPanel.contains(e.target) && !a11yToggle.contains(e.target)) a11yPanel.classList.remove('open');
    });
  }

  /* ── login modal wiring ── */
  const loginBtn = document.getElementById('navLoginBtn');
  const loginModal = document.getElementById('loginModal');
  if (loginBtn && loginModal) {
    loginBtn.addEventListener('click', () => loginModal.classList.add('open'));
  }

  /* ── avatar click -> go to profile ── */
  const avatarBtn = document.getElementById('navAvatarBtn');
  if (avatarBtn) {
    avatarBtn.addEventListener('click', () => { window.location.href = 'perfil.html'; });
  }

  /* ── scroll reveal (works across pages) ── */
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: .08 });
  document.querySelectorAll('.reveal').forEach(r => io.observe(r));
});

      <button onclick="ALT.loginWithGoogle();ALT.renderNavAuthState();document.getElementById('loginModal').classList.remove('open');ALT.toast('✅ Bienvenido, '+ALT.state.user.name+'!');" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:13px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:14px;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar con Google
      </button>
      <div style="display:flex;align-items:center;gap:10px;margin:14px 0;"><div style="flex:1;height:1px;background:var(--border)"></div><span style="font-size:11px;color:var(--gray)">o con email</span><div style="flex:1;height:1px;background:var(--border)"></div></div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <input id="loginName" type="text" placeholder="Tu nombre" style="border:1.5px solid var(--border);border-radius:9px;padding:12px 14px;font-size:14px;font-family:var(--fB);outline:none;color:var(--ink);background:var(--bg);width:100%;">
        <input id="loginEmail" type="email" placeholder="tu@email.com" style="border:1.5px solid var(--border);border-radius:9px;padding:12px 14px;font-size:14px;font-family:var(--fB);outline:none;color:var(--ink);background:var(--bg);width:100%;">
        <button onclick="const n=document.getElementById('loginName').value.trim();const e=document.getElementById('loginEmail').value.trim();if(!n||!e){ALT.toast('⚠️ Completa todos los campos');return;}ALT.login(n,e);ALT.renderNavAuthState();document.getElementById('loginModal').classList.remove('open');ALT.toast('✅ Bienvenido, '+n+'!');" style="background:var(--wine);color:#fff;border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fD);">Iniciar sesión / Registrarse</button>
      </div>
    </div>
  </div>`);
  document.getElementById('loginModal').addEventListener('click', e => { if(e.target===document.getElementById('loginModal')) document.getElementById('loginModal').classList.remove('open'); });
}

function injectA11yWidget() {
  document.body.insertAdjacentHTML('beforeend', `
  <button id="a11y-toggle" aria-label="Accesibilidad">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="4" r="1.5"/><path d="M19 8.5h-5.5l-.9-1.5H11l-.9 1.5H4.5v1.5h2.3l1.7 8.5h7l1.7-8.5H19V8.5z"/></svg>
  </button>
  <div id="a11y-panel">
    <div style="font-family:var(--fD);font-size:13px;font-weight:700;color:var(--wine);margin-bottom:12px;">♿ Accesibilidad</div>
    <div class="a11y-row"><span class="a11y-label">Modo oscuro</span><button class="a11y-toggle-switch ${ALT.state.darkMode?'on':''}" onclick="ALT.toggleDarkMode();this.classList.toggle('on')"></button></div>
    <div class="a11y-row"><span class="a11y-label">Tamaño de letra</span><div class="a11y-btns"><button class="a11y-mini-btn ${ALT.state.fontSize==='base'?'active':''}" onclick="ALT.setFontSize('base');document.querySelectorAll('#a11y-panel .a11y-mini-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">A</button><button class="a11y-mini-btn ${ALT.state.fontSize==='lg'?'active':''}" style="font-size:14px" onclick="ALT.setFontSize('lg');document.querySelectorAll('#a11y-panel .a11y-mini-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">A</button><button class="a11y-mini-btn ${ALT.state.fontSize==='xl'?'active':''}" style="font-size:16px" onclick="ALT.setFontSize('xl');document.querySelectorAll('#a11y-panel .a11y-mini-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">A</button></div></div>
    <div class="a11y-row"><span class="a11y-label">Alto contraste</span><button class="a11y-toggle-switch ${ALT.state.highContrast?'on':''}" onclick="ALT.toggleContrast();this.classList.toggle('on')"></button></div>
    <div class="a11y-row" style="border-bottom:none"><span class="a11y-label">Leer en voz alta</span><div class="a11y-btns"><button class="a11y-mini-btn" onclick="ALT.readPageAloud()">▶</button><button class="a11y-mini-btn" onclick="ALT.stopReading()">■</button></div></div>
  </div>`);
}

function setPageMeta({ title, description, path }) {
  document.title = title + ' — ALT 60/40';
  let desc = document.querySelector('meta[name="description"]');
  if (!desc) { desc = document.createElement('meta'); desc.name='description'; document.head.appendChild(desc); }
  desc.content = description;
  if (!document.querySelector('link[rel="icon"]')) {
    const fav = document.createElement('link'); fav.rel='icon';
    fav.href=`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23640031'/><text y='.85em' font-size='70' x='8' font-family='sans-serif' fill='%23F7CB15' font-weight='bold'>A</text></svg>`;
    document.head.appendChild(fav);
  }
}

function initPage({ page, title, description }) {
  setPageMeta({ title, description, path: page });
  injectNav(page);
  injectFooter();
  injectLoginModal();
  injectA11yWidget();
  if (!document.getElementById('toast-host')) document.body.insertAdjacentHTML('beforeend','<div id="toast-host"></div>');
  ALT.init();
}

</script>
<script>
initPage({page:'memes.html',title:'Biblioteca de Memes 2026',description:'Los memes más virales de 2026 y los clásicos de internet, explicados para todas las generaciones.'});

const MEMES = [
  /* GEN ALPHA / GEN Z 2025-2026 */
  {id:'aura-farm',cat:'2026',gen:'Gen Alpha',emoji:'✨',bg:'mv1',name:'Aura Farming',origin:'TikTok, viral desde julio 2025',def:'El meme más activo de 2025-2026. Se filman o describen momentos con puntajes de "aura" ganada o perdida. "+500 aura: llegué con café al trabajo." "-1000 aura: me caí frente a todos." La comunidad decide los puntos.',how:'"Me tropecé en el metro: -800 aura." "Le ayudé a la señora: +1500 aura." Aparece en TikTok, X e Instagram como caption estándar.',date:'Julio 2025 – presente',plat:'TikTok, Instagram, X',vigencia:'high',vigLabel:'🔥 Viral 2026'},
  {id:'the-ick',cat:'2026',gen:'Gen Z',emoji:'🤢',bg:'mv2',name:'The Ick',origin:'Slang amoroso inglés, boom en español 2025',def:'Ese momento exacto donde algo que hace alguien que te gusta genera repulsión irreversible. No tiene cura. Los videos de "cosas que me dan el ick" son de los más virales de 2025-2026 en TikTok.',how:'"Correr raro → the ick." "Hablar con el mozo por mí → the ick instantáneo." "Usar la palabra 'bacán' → the ick supremo."',date:'2025-2026',plat:'TikTok, Instagram',vigencia:'high',vigLabel:'🔥 Viral 2026'},
  {id:'ghibli-ai',cat:'ia',gen:'Todas',emoji:'🎨',bg:'mv3',name:'Arte IA estilo Ghibli',origin:'ChatGPT DALL-E actualización, abril 2025',def:'Convertir fotos reales en ilustraciones estilo Studio Ghibli usando IA. Generó debate global sobre derechos de autor. En 2026 hay variantes: Pixar, anime, pintura impresionista. Une a todas las generaciones.',how:'Subir foto + "hazla estilo Ghibli" a cualquier IA de imágenes. En 2026, los abuelos lo usan para convertir fotos de familia en arte. Los nietos lo hacen con selfies.',date:'Abril 2025 – presente',plat:'Instagram, TikTok, X',vigencia:'high',vigLabel:'🔥 Vigente 2026'},
  {id:'deepfake-meme',cat:'ia',gen:'Todas',emoji:'🎭',bg:'mv4',name:'Deepfake (el meme que da miedo)',origin:'Tecnología de síntesis de video ~2019, crisis 2025-2026',def:'Videos falsos generados por IA tan realistas que confunden incluso a personas atentas. En 2026 es el problema de desinformación más grave. El "meme" es que ya nadie sabe si algo es real.',how:'"¿Esto es real o deepfake?" se convirtió en la pregunta más frecuente en WhatsApp familiar de 2026. Detectar deepfakes es la nueva habilidad digital esencial.',date:'2019, crisis 2026',plat:'YouTube, TikTok, X, WhatsApp',vigencia:'high',vigLabel:'Crisis 2026'},
  {id:'skibidi',cat:'genalpha',gen:'Gen Alpha',emoji:'🚽',bg:'mv5',name:'Skibidi Toilet',origin:'Canal DaFuq!?Boom! en YouTube, 2023',def:'Serie animada de cabezas en inodoros en guerra contra cámaras humanoides. El lenguaje base de Gen Alpha: "skibidi" (absurdo), "sigma" (genial), "Ohio" (extraño). En 2026 tiene película en producción.',how:'"Eso es muy skibidi Ohio." "Ese profe es sigma." "¿Por qué eres tan skibidi?" Sigue siendo el mayor idioma intergeneracional de desconexión en 2026.',date:'2023 – vigente 2026',plat:'YouTube, TikTok',vigencia:'high',vigLabel:'Vigente 2026'},

  /* CLÁSICOS VIRALES */
  {id:'this-is-fine',cat:'clasico',gen:'Gen X / Millennials',emoji:'🐕',bg:'mv6',name:'This is Fine 🔥',origin:'Cómic "On Fire" de KC Green, 2013',def:'Un perro tomando café mientras todo arde a su alrededor, diciendo "this is fine". Representa la aceptación resignada ante el caos. En 2026 es el meme político y laboral más usado del año.',how:'"This is fine" cuando suben las tasas de interés. "This is fine" cuando el proyecto falla a último minuto. El meme del burnout colectivo.',date:'2013, permanentemente vigente',plat:'X, Reddit, LinkedIn, Instagram',vigencia:'high',vigLabel:'Clásico permanente'},
  {id:'pepe',cat:'clasico',gen:'Millennials / Gen Z',emoji:'🐸',bg:'mv7',name:'Pepe the Frog',origin:'Cómic "Boy\'s Club" de Matt Furie, 2005',def:'El meme más longevo de internet. Existe un Pepe para cada emoción. Es el contenedor visual universal: Pepe triste, Pepe feliz, Pepe nervioso, Pepe estoico. En 2026 sigue siendo la forma más rápida de expresar una emoción.',how:'Como reacción en cualquier plataforma. En grupos de WhatsApp de todas las generaciones. Hay Pepes para literalmente cualquier situación humana.',date:'2005 – vigente siempre',plat:'Reddit, Instagram, X, WhatsApp',vigencia:'high',vigLabel:'Clásico eterno'},
  {id:'moai',cat:'emoji',gen:'Gen Z / Millennials',emoji:'🗿',bg:'mv8',name:'Moai 🗿',origin:'Emoji resignificado ~2020',def:'La estatua de Isla de Pascua como símbolo de indiferencia total. "No me afecta nada y no voy a reaccionar." En 2026 se combina con otros emojis: 🗿💅 (indiferente y elegante), 🗿🔥 (indiferente ante el caos).',how:'"🗿" como respuesta a noticias absurdas. "🗿🗿🗿" para indiferencia extrema. "🗿💅" para "no me afecta y además me va bien".',date:'~2020, vigente 2026',plat:'WhatsApp, TikTok, X',vigencia:'med',vigLabel:'Vigencia media'},
  {id:'distracted-bf',cat:'clasico',gen:'Millennials / Gen X',emoji:'👀',bg:'mv9',name:'Distracted Boyfriend',origin:'Stock photo de Antonio Guillem, 2012. Meme viral 2017',def:'Un hombre mira a otra mujer mientras su novia lo observa furiosa. El meme más adaptable de la historia: etiquetas las tres personas con cualquier concepto. "Yo / algo nuevo / lo que debería hacer".',how:'"Yo" mirando a "procrastinar" mientras deja a "mis obligaciones" mirándome. En 2026 se usa mucho para hablar de IA vs trabajo tradicional.',date:'2017, vigente 2026',plat:'Reddit, Instagram, X',vigencia:'med',vigLabel:'Vigencia media'},
  {id:'woman-yelling',cat:'clasico',gen:'Millennials / Gen X / Boomers',emoji:'🐱',bg:'mv10',name:'Woman Yelling at Cat',origin:'Dos fotos separadas unidas en Twitter, 2019',def:'A la izquierda: una mujer señalando furiosa (de Real Housewives). A la derecha: un gato blanco sentado calmamente en una mesa. Representa cualquier conflicto donde un lado está furioso y el otro no entiende por qué.',how:'Es el meme intergeneracional por excelencia. Boomers, Gen X, Millennials y Gen Z lo usan por igual. En 2026 sigue siendo el formato estándar para conflictos de opinión.',date:'2019, vigente 2026',plat:'Twitter/X, Instagram, Facebook',vigencia:'high',vigLabel:'Vigencia alta'},

  /* MILLENNIALS */
  {id:'ok-boomer-meme',cat:'millennial',gen:'Gen Z / Millennials',emoji:'🙄',bg:'mv11',name:'OK Boomer',origin:'TikTok, noviembre 2019',def:'Respuesta sarcástica a opiniones percibidas como anticuadas. Una frase que definió el conflicto generacional de una época. En 2026 se usa con más ironía que antes, y también como autocrítica de los propios Millennials.',how:'"Me dijo que solo hay que trabajar más duro para comprar una casa." "OK Boomer." En 2026 también se usa: "OK Millennial" como respuesta irónica de Gen Z a los Millennials nostálgicos.',date:'2019, irónicamente vigente 2026',plat:'TikTok, Twitter, Instagram',vigencia:'med',vigLabel:'Vigencia media'},
  {id:'yolo-throwback',cat:'millennial',gen:'Millennials',emoji:'🎉',bg:'mv12',name:'YOLO (nostalgia Millennial)',origin:'Drake "The Motto", 2011',def:'"You Only Live Once". El lema que definió la juventud Millennial. Se usó para justificar decisiones impulsivas. En 2026 los Millennials de 30+ lo usan con ironía nostálgica: "hacía eso por YOLO y ahora me arrepiento."',how:'"Me fui de viaje sin ahorros en 2012. YOLO. Ahora sigo pagando la tarjeta." El meme generacional del arrepentimiento cariñoso.',date:'2011, nostalgia vigente 2026',plat:'Instagram (TBT), Facebook',vigencia:'low',vigLabel:'Nostalgia'},
];

const FILTERS = [
  {id:'all',label:'Todos 🌐'},
  {id:'2026',label:'Virales 2026 🔥'},
  {id:'ia',label:'IA 🤖'},
  {id:'clasico',label:'Clásicos 🏛️'},
  {id:'genalpha',label:'Gen Alpha 👾'},
  {id:'millennial',label:'Millennials 🎤'},
  {id:'emoji',label:'Emojis 😎'},
];

const BG_CLASSES = ['mv1','mv2','mv3','mv4','mv5','mv6','mv7','mv8','mv9','mv10','mv11','mv12'];
let activeFilter = 'all';

function renderFilters(){
  document.getElementById('memeFilters').innerHTML = FILTERS.map(f=>`
    <button class="mfil ${f.id===activeFilter?'on':''}" onclick="setFilter('${f.id}')">${f.label}</button>`).join('');
}

function setFilter(f){ activeFilter=f; renderFilters(); renderMemes(); }

function renderMemes(){
  const list = activeFilter==='all' ? MEMES : MEMES.filter(m=>m.cat===activeFilter);
  if(!list.length){
    document.getElementById('memeGrid').innerHTML='<div class="no-results">No hay memes para este filtro aún.</div>';
    return;
  }
  document.getElementById('memeGrid').innerHTML = list.map((m,i)=>{
    const isFav = ALT.isFavorite('meme-'+m.id);
    return `<div class="mcard reveal" style="transition-delay:${i*.05}s">
      <div class="mcard-vis ${BG_CLASSES[i%BG_CLASSES.length]}">
        <span>${m.emoji}</span>
        <span class="mcard-gen">${m.gen}</span>
      </div>
      <div class="mcard-body">
        <div class="mcard-name">${m.name}</div>
        <div class="mcard-origin">📅 ${m.origin}</div>
        <div class="mcard-def">${m.def}</div>
        <div class="mcard-how"><b style="color:var(--wine)">Cómo se usa:</b> ${m.how}</div>
        <span class="mcard-vig ${{high:'vig-high',med:'vig-med',low:'vig-low'}[m.vigencia]}">${m.vigLabel}</span>
        <div class="mcard-meta">
          <span><b>Plataformas:</b> ${m.plat}</span>
          <span><b>Fecha:</b> ${m.date}</span>
        </div>
        <div class="mcard-actions">
          <button class="mcard-btn ${isFav?'fav-on':''}" id="mf-${m.id}" onclick="toggleFav('${m.id}',this)">${isFav?'⭐ Guardado':'☆ Guardar'}</button>
          <button class="mcard-btn" onclick="ALT.copyText('${m.name}: ${m.def.slice(0,120).replace(/'/g,"\\'").replace(/"/g,'\\"')}...')">📋 Copiar</button>
          <button class="mcard-btn" onclick="ALT.shareContent('${m.name} — ALT 60/40','${m.def.slice(0,80).replace(/'/g,"\\'")}')">↗ Compartir</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.reveal').forEach(r=>{
    new IntersectionObserver(e=>{if(e[0].isIntersecting)e[0].target.classList.add('visible');},{threshold:.1}).observe(r);
  });
}

function toggleFav(id,btn){
  const on = ALT.toggleFavorite('meme-'+id);
  btn.textContent = on?'⭐ Guardado':'☆ Guardar';
  btn.classList.toggle('fav-on',on);
  ALT.toast(on?'⭐ Meme guardado':'Eliminado de favoritos');
}

renderFilters();
renderMemes();
</script>
