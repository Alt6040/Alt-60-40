<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
/* ── RADAR ── */
.radar-band{background:var(--wine);padding:36px 48px;}
.radar-inner{max-width:1280px;margin:0 auto;}
.radar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:22px;}
.radar-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:13px 12px;text-align:center;cursor:pointer;transition:all .2s;}
.radar-chip:hover{background:rgba(247,203,21,.18);border-color:var(--gold);}
.rc-word{font-family:var(--fD);font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;}
.rc-gen{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:3px;}
.rc-trend{font-size:12px;font-weight:700;color:#4ade80;}
/* ── TABS ── */
.main-tabs{display:flex;gap:0;padding:0;max-width:1280px;margin:32px auto 0;border-bottom:2px solid var(--border);}
.main-tab{font-family:var(--fD);font-size:14px;font-weight:700;padding:13px 28px;border:none;background:none;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.main-tab.on{color:var(--wine);border-bottom-color:var(--wine);}
.main-tab:hover{color:var(--wine);}
/* ── FILTERS ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;max-width:1280px;margin:20px auto 0;padding:0 0 0;}
.fchip{font-family:var(--fD);font-size:12.5px;font-weight:700;padding:7px 15px;border-radius:100px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--wine);cursor:pointer;transition:all .15s;}
.fchip.on,.fchip:hover{background:var(--wine);color:#fff;border-color:var(--wine);}
.fchip.plat.on,.fchip.plat:hover{background:var(--magenta);border-color:var(--magenta);}
/* ── CONTENT AREA ── */
.content-area{max-width:1280px;margin:0 auto;padding:24px 0 80px;}
/* ── MEME CARDS ── */
.meme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
.mcard{display:grid;grid-template-columns:180px 1fr;border-radius:18px;overflow:hidden;border:1.5px solid var(--border);background:var(--card-bg);transition:transform .2s,box-shadow .2s;}
.mcard:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(100,0,49,.1);}
.mcard-vis{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:56px;min-height:200px;position:relative;gap:6px;}
.mv1{background:linear-gradient(160deg,#640031,#7A1843);}
.mv2{background:linear-gradient(160deg,#7698B3,#4f7186);}
.mv3{background:linear-gradient(160deg,#F7CB15,#e0b711);}
.mv4{background:linear-gradient(160deg,#111,#333);}
.mv5{background:linear-gradient(160deg,#7A1843,#9b2c5e);}
.mv6{background:linear-gradient(160deg,#1a1a2e,#533483);}
.mv7{background:linear-gradient(160deg,#0f3460,#7698B3);}
.mv8{background:linear-gradient(160deg,#640031,#3d0021);}
.mv9{background:linear-gradient(160deg,#155724,#28a745);}
.mv10{background:linear-gradient(160deg,#1a237e,#3949ab);}
.mv11{background:linear-gradient(160deg,#4a148c,#7b1fa2);}
.mv12{background:linear-gradient(160deg,#bf360c,#e64a19);}
.mcard-gen-badge{font-family:var(--fD);font-size:9px;font-weight:700;padding:3px 8px;border-radius:100px;background:rgba(0,0,0,.4);color:#fff;text-transform:uppercase;letter-spacing:.5px;}
.mcard-vig-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;}
.vb-high{background:#fef2f2;color:#dc2626;}
.vb-med{background:#fef3c7;color:#92400e;}
.vb-low{background:#f5f5f4;color:#78716c;}
.vb-nostalgia{background:#ede9fe;color:#5b21b6;}
.mcard-body{padding:22px;}
.mcard-name{font-family:var(--fD);font-size:17px;font-weight:800;color:var(--wine);margin-bottom:3px;}
.mcard-origin{font-size:11px;color:var(--steel);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.mcard-def{font-size:13.5px;color:var(--text-soft);line-height:1.65;margin-bottom:8px;}
.mcard-how{font-size:13px;color:var(--text-soft);margin-bottom:10px;}
.mcard-examples{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.mcard-examples.open{display:block;}
.mcard-ex-item{font-size:12.5px;color:var(--text-soft);line-height:1.65;padding:7px 10px;background:var(--bg-soft);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--wine);}
.mcard-toggle{font-family:var(--fD);font-size:12px;font-weight:700;color:var(--magenta);background:none;border:none;cursor:pointer;padding:0;margin-bottom:10px;}
.mcard-meta{font-size:11px;color:var(--gray);margin-bottom:10px;}
.mcard-actions{display:flex;gap:7px;flex-wrap:wrap;}
.m-btn{font-family:var(--fD);font-size:11px;font-weight:700;padding:6px 12px;border-radius:100px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);cursor:pointer;transition:all .15s;}
.m-btn:hover{border-color:var(--wine);color:var(--wine);}
.m-btn.fav-on{background:#fff8e1;border-color:var(--gold);color:#92400e;}
/* ── TREND CARDS ── */
.trend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.tcard{border-radius:18px;overflow:hidden;border:1.5px solid var(--border);background:var(--card-bg);transition:transform .2s,box-shadow .2s;}
.tcard:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(100,0,49,.1);}
.tcard-vis{height:170px;display:flex;align-items:center;justify-content:center;font-size:58px;position:relative;}
.tv-gen{position:absolute;top:10px;left:10px;font-family:var(--fD);font-size:9px;font-weight:700;padding:3px 8px;border-radius:100px;background:rgba(0,0,0,.45);color:#fff;text-transform:uppercase;letter-spacing:.5px;}
.tv-status{position:absolute;top:10px;right:10px;font-family:var(--fD);font-size:9px;font-weight:700;padding:3px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.5px;}
.tv-viral{background:#fef2f2;color:#dc2626;}
.tv-trending{background:#f0fdf4;color:#16a34a;}
.tv-past{background:#f5f5f4;color:#78716c;}
.tcard-body{padding:20px;}
.tcard-plat{font-size:10px;font-weight:700;color:var(--steel);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.tcard-title{font-family:var(--fD);font-size:15px;font-weight:700;color:var(--wine);margin-bottom:7px;line-height:1.3;}
.tcard-desc{font-size:13px;color:var(--text-soft);line-height:1.6;margin-bottom:10px;}
.tcard-toggle{font-family:var(--fD);font-size:12px;font-weight:700;color:var(--magenta);background:none;border:none;cursor:pointer;padding:0;}
.tcard-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.tcard-detail.open{display:block;}
.tcard-detail-row{font-size:12.5px;color:var(--text-soft);line-height:1.7;margin-bottom:6px;}
.tcard-detail-row b{color:var(--wine);}
.tcard-ex{font-size:12px;color:var(--text-soft);padding:6px 10px;background:var(--bg-soft);border-radius:7px;margin-bottom:5px;border-left:3px solid var(--magenta);}
/* ── EMPTY ── */
.no-results{grid-column:1/-1;text-align:center;padding:64px 20px;color:var(--gray);}
.no-results-icon{font-size:40px;margin-bottom:12px;}
/* ── LAYOUT ── */
.page-container{max-width:1280px;margin:0 auto;padding:0 48px;}
@media(max-width:960px){
  .page-container{padding:0 20px;}
  .meme-grid{grid-template-columns:1fr;}
  .mcard{grid-template-columns:1fr;}
  .mcard-vis{min-height:140px;}
  .trend-grid{grid-template-columns:1fr;}
  .radar-grid{grid-template-columns:repeat(2,1fr);}
  .radar-band{padding:28px 20px;}
  .main-tabs{padding:0 20px;}
}
</style>
</head>
<body>
<div id="site-nav-placeholder"></div>

<div class="page-hero">
  <div class="page-hero-eyebrow">🌐 Actualizado julio 2026</div>
  <h1 class="page-hero-title">Memes & Tendencias</h1>
  <p class="page-hero-sub">Gen Alpha, Gen Z, Millennials, Gen X y Boomers — todo en un solo lugar. Memes con historia, tendencias con contexto.</p>
</div>

<!-- RADAR -->
<div class="radar-band">
  <div class="radar-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div>
        <div style="font-family:var(--fD);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;">📡 Radar en tiempo real — Julio 2026</div>
        <div style="font-family:var(--fD);font-size:19px;font-weight:800;color:#fff;">Lo más buscado ahora</div>
      </div>
    </div>
    <div class="radar-grid" id="radarGrid"></div>
  </div>
</div>

<!-- MAIN TABS + FILTERS -->
<div class="page-container">
  <div class="main-tabs">
    <button class="main-tab on" id="tabMemes"   onclick="switchTab('memes')">😂 Memes</button>
    <button class="main-tab"   id="tabTrends"   onclick="switchTab('trends')">🔥 Tendencias</button>
  </div>

  <!-- GEN FILTER (shared) -->
  <div class="filter-bar" id="genFilters" style="margin-top:20px;"></div>

  <!-- PLATFORM FILTER (trends only) -->
  <div class="filter-bar" id="platFilters" style="display:none;margin-top:10px;"></div>

  <!-- CONTENT -->
  <div class="content-area">
    <div id="memesSection">
      <div class="meme-grid" id="memeGrid"></div>
    </div>
    <div id="trendsSection" style="display:none;">
      <div class="trend-grid" id="trendGrid"></div>
    </div>
  </div>
</div>

<div id="site-footer-placeholder"></div>
<script src="js/app-core.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
initPage({page:'cultura.html', title:'Memes & Tendencias 2026', description:'Memes y tendencias de todas las generaciones: Gen Alpha, Gen Z, Millennials, Gen X y Boomers.'});

/* ── STATE ── */
let activeTab = 'memes';
let activeGen = 'all';
let activePlat = 'all';

/* ── GEN FILTERS ── */
const GEN_FILTERS = [
  {id:'all',       label:'Todas las generaciones'},
  {id:'2026',      label:'Virales 2026 🔥',  memesOnly:true},
  {id:'ia',        label:'IA 🤖',             memesOnly:true},
  {id:'clasico',   label:'Clásicos 🏛️',       memesOnly:true},
  {id:'genalpha',  label:'Gen Alpha 👾'},
  {id:'genz',      label:'Gen Z',             memesOnly:true},
  {id:'millennial',label:'Millennials 🎤'},
  {id:'boomer',    label:'Boomers / Gen X',   memesOnly:true},
  {id:'emoji',     label:'Emojis 😎',         memesOnly:true},
  /* trend-only gen keys */
  {id:'alpha',     label:'Gen Alpha 👾',      trendsOnly:true},
  {id:'genz-t',    label:'Gen Z',             trendsOnly:true, genKey:'genz'},
  {id:'millennial-t',label:'Millennials',     trendsOnly:true, genKey:'millennial'},
  {id:'genx',      label:'Gen X / Boomers',  trendsOnly:true},
];

/* ── PLATFORM FILTERS (trends) ── */
const PLAT_FILTERS = [
  {id:'all',label:'Todas'},
  {id:'tiktok',label:'TikTok'},
  {id:'youtube',label:'YouTube'},
  {id:'instagram',label:'Instagram'},
  {id:'whatsapp',label:'WhatsApp'},
  {id:'trabajo',label:'Trabajo'},
  {id:'ia',label:'IA'},
  {id:'x',label:'X / Twitter'},
];

/* ── BG CLASSES ── */
const BG=['mv1','mv2','mv3','mv4','mv5','mv6','mv7','mv8','mv9','mv10','mv11','mv12'];
const GEN_LABELS={alpha:'Gen Alpha',genz:'Gen Z',millennial:'Millennial','genx boomer':'Gen X / Boomer',all:'Multi-gen'};

/* ── RADAR ── */
function renderRadar(){
  document.getElementById('radarGrid').innerHTML = DICT.TRENDING_TODAY.map(t=>`
    <div class="radar-chip" onclick="searchTerm('${t.word}')">
      <div class="rc-word">${t.word}</div>
      <div class="rc-gen">${t.gen}</div>
      <div class="rc-trend">↑ ${t.trend}</div>
    </div>`).join('');
}

function searchTerm(word){
  const term = DICT.TERMS.find(t=>t.word.toLowerCase().includes(word.toLowerCase().split(' ')[0]));
  if(term) window.location.href='diccionario.html?word='+term.id;
  else window.location.href='diccionario.html?q='+encodeURIComponent(word);
}

/* ── TABS ── */
function switchTab(tab){
  activeTab = tab;
  activeGen = 'all';
  document.getElementById('tabMemes').classList.toggle('on', tab==='memes');
  document.getElementById('tabTrends').classList.toggle('on', tab==='trends');
  document.getElementById('memesSection').style.display   = tab==='memes'  ? 'block' : 'none';
  document.getElementById('trendsSection').style.display  = tab==='trends' ? 'block' : 'none';
  document.getElementById('platFilters').style.display    = tab==='trends' ? 'flex'  : 'none';
  renderGenFilters();
  if(tab==='memes') renderMemes();
  else renderTrends();
}

/* ── GEN FILTERS ── */
function renderGenFilters(){
  const visible = GEN_FILTERS.filter(f=>{
    if(activeTab==='memes'  && f.trendsOnly) return false;
    if(activeTab==='trends' && f.memesOnly)  return false;
    return true;
  });
  document.getElementById('genFilters').innerHTML = visible.map(f=>`
    <button class="fchip ${activeGen===f.id?'on':''}" onclick="setGen('${f.id}')">${f.label}</button>`).join('');
}

function setGen(g){
  activeGen = g;
  renderGenFilters();
  activeTab==='memes' ? renderMemes() : renderTrends();
}

/* ── PLAT FILTERS (trends) ── */
function renderPlatFilters(){
  document.getElementById('platFilters').innerHTML = PLAT_FILTERS.map(p=>`
    <button class="fchip plat ${activePlat===p.id?'on':''}" onclick="setPlat('${p.id}')">${p.label}</button>`).join('');
}

function setPlat(p){ activePlat=p; renderPlatFilters(); renderTrends(); }

/* ── RENDER MEMES ── */
function renderMemes(){
  let list = activeGen==='all'
    ? DICT.MEMES_DATA
    : DICT.MEMES_DATA.filter(m=>m.cat===activeGen);

  if(!list.length){
    document.getElementById('memeGrid').innerHTML=`<div class="no-results"><div class="no-results-icon">😕</div>No hay memes para este filtro aún.</div>`;
    return;
  }

  const vigClass = {high:'vb-high', med:'vb-med', low:'vb-low', nostalgia:'vb-nostalgia'};

  document.getElementById('memeGrid').innerHTML = list.map((m,i)=>{
    const fav = ALT.isFavorite('meme-'+m.id);
    const exHtml = m.examples ? m.examples.map(e=>`<div class="mcard-ex-item">💬 ${e.replace(/^["']|["']$/g,'')}</div>`).join('') : '';
    return `<div class="mcard reveal" style="transition-delay:${i*.04}s">
      <div class="mcard-vis ${BG[i%BG.length]}">
        <span>${m.emoji}</span>
        <span class="mcard-gen-badge">${m.gen}</span>
        <span class="mcard-vig-badge ${vigClass[m.vigencia]||'vb-med'}">${m.vigLabel}</span>
      </div>
      <div class="mcard-body">
        <div class="mcard-name">${m.name}</div>
        <div class="mcard-origin">📅 ${m.origin}</div>
        <div class="mcard-def">${m.def}</div>
        <div class="mcard-how"><b style="color:var(--wine)">Cómo se usa:</b> ${m.how}</div>
        ${exHtml ? `<button class="mcard-toggle" onclick="toggleEx(this)">Ver ejemplos ▾</button>
        <div class="mcard-examples">${exHtml}</div>` : ''}
        <div class="mcard-meta">📱 ${m.plat} · 📅 ${m.date}</div>
        <div class="mcard-actions">
          <button class="m-btn ${fav?'fav-on':''}" id="mf-${m.id}" onclick="toggleFav('${m.id}',this)">${fav?'⭐ Guardado':'☆ Guardar'}</button>
          <button class="m-btn" onclick="ALT.copyText('${m.name}: ${m.def.substring(0,100).replace(/'/g,'').replace(/"/g,'')}...')">📋 Copiar</button>
          <button class="m-btn" onclick="ALT.shareContent('${m.name} — ALT 60/40','Descubrí esto en ALT 60/40')">↗ Compartir</button>
        </div>
      </div>
    </div>`;
  }).join('');
  animateReveal();
}

/* ── RENDER TRENDS ── */
const BG_T=['mv1','mv2','mv3','mv5','mv6','mv7','mv8','mv9','mv10','mv11','mv12'];

function renderTrends(){
  let list = DICT.TRENDS_DATA.filter(t=>{
    const genMatch = activeGen==='all' || t.gen.includes(activeGen.replace('-t',''));
    const platMatch = activePlat==='all' || t.platform.includes(activePlat);
    return genMatch && platMatch;
  });

  if(!list.length){
    document.getElementById('trendGrid').innerHTML=`<div class="no-results"><div class="no-results-icon">😕</div>No hay tendencias para esta combinación.</div>`;
    return;
  }

  const statusCls={viral:'tv-viral',trending:'tv-trending',past:'tv-past'};
  const statusLabel={viral:'🔥 Viral',trending:'📈 En tendencia',past:'📉 Pasado'};
  const genLabel=t=>t.gen.split(' ').map(g=>({alpha:'Gen Alpha',genz:'Gen Z',millennial:'Millennial',genx:'Gen X',boomer:'Boomer',all:'Multi-gen'}[g]||g)).filter(Boolean).join(' · ');

  document.getElementById('trendGrid').innerHTML = list.map((t,i)=>{
    const exHtml = t.examples ? t.examples.map(e=>`<div class="tcard-ex">💬 ${e.replace(/^["']|["']$/g,'')}</div>`).join('') : '';
    return `<div class="tcard reveal" style="transition-delay:${i*.04}s">
      <div class="tcard-vis" style="background:linear-gradient(135deg,${['#640031,#7A1843','#7698B3,#4f7186','#1a1a2e,#533483','#0f3460,#7698B3','#3d0021,#640031','#155724,#28a745','#4a148c,#7b1fa2','#bf360c,#e64a19'][i%8]})"  >
        <span style="font-size:56px">${t.emoji}</span>
        <span class="tv-gen">${genLabel(t)}</span>
        <span class="tv-status ${statusCls[t.status]||''}">${statusLabel[t.status]||''}</span>
      </div>
      <div class="tcard-body">
        <div class="tcard-plat">${t.platform.toUpperCase()}</div>
        <div class="tcard-title">${t.title}</div>
        <div class="tcard-desc">${t.desc}</div>
        <button class="tcard-toggle" onclick="toggleTDetail(this)">Ver más ▾</button>
        <div class="tcard-detail">
          <div class="tcard-detail-row"><b>📅 Origen:</b> ${t.origin}</div>
          <div class="tcard-detail-row"><b>⭐ Quién la hizo viral:</b> ${t.famous}</div>
          <div class="tcard-detail-row"><b>🔥 Por qué importa:</b> ${t.why}</div>
          <div class="tcard-detail-row" style="margin-top:6px;">${t.full}</div>
          ${exHtml ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);"><div style="font-family:var(--fD);font-size:11px;font-weight:700;color:var(--wine);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">Ejemplos reales</div>${exHtml}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
  animateReveal();
}

/* ── HELPERS ── */
function toggleEx(btn){
  const ex=btn.nextElementSibling;
  ex.classList.toggle('open');
  btn.textContent=ex.classList.contains('open')?'Ocultar ejemplos ▴':'Ver ejemplos ▾';
}
function toggleTDetail(btn){
  const d=btn.nextElementSibling;
  d.classList.toggle('open');
  btn.textContent=d.classList.contains('open')?'Ver menos ▴':'Ver más ▾';
}
function toggleFav(id,btn){
  const on=ALT.toggleFavorite('meme-'+id);
  btn.textContent=on?'⭐ Guardado':'☆ Guardar';
  btn.classList.toggle('fav-on',on);
  ALT.toast(on?'⭐ Meme guardado':'Eliminado de favoritos');
}
function animateReveal(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.reveal').forEach(r=>{
      new IntersectionObserver(e=>{if(e[0].isIntersecting)e[0].target.classList.add('visible');},{threshold:.05}).observe(r);
    });
  });
}

/* ── INIT ── */
renderRadar();
renderGenFilters();
renderPlatFilters();
renderMemes();
</script>
</body>
</html>
